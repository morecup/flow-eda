server:
  port: 9071
spring:
  application:
    name: flow-eda-server
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}

  # 数据库配置 - 连接到 Web 的数据库
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.0.5:33307/flow_eda?useSSL=false&useUnicode=true&characterEncoding=utf-8
    username: root
    password: 'ljzh@2003'
    hikari:
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      minimum-idle: 5
      maximum-pool-size: 20

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

# Flyway 配置 - 暂时禁用，数据库表已存在
flyway:
  enabled: false

