server:
  port: 9071
  # 使用网关时不需要 context-path
  # 网关会处理 /flow-eda-server 前缀并转发给后端

spring:
  application:
    name: flow-eda-server

  main:
    allow-bean-definition-overriding: true

  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:192.168.0.5}:${DB_PORT:33307}/${DB_NAME:flow_eda}?useSSL=false&useUnicode=true&characterEncoding=utf-8
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:ljzh@2003}
    hikari:
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      minimum-idle: 5
      maximum-pool-size: 20

  # Flyway配置
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    encoding: UTF-8
    validate-on-migrate: true

# MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-handlers-package: com.flow.eda.server.mybatis
  configuration:
    map-underscore-to-camel-case: true
