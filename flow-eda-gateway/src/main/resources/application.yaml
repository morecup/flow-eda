server:
  port: 8090

spring:
  application:
    name: flow-eda-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
    gateway:
      # 路由配置
      routes:
        # Web服务路由
        - id: flow-eda-web
          uri: lb://flow-eda-web
          predicates:
            - Path=/flow-eda-web/**
          filters:
            - StripPrefix=1
        # OAuth2服务路由
        - id: flow-eda-oauth2
          uri: lb://flow-eda-oauth2
          predicates:
            - Path=/flow-eda-oauth2/**
          filters:
            - StripPrefix=1
        # Logger服务路由
        - id: flow-eda-logger
          uri: lb://flow-eda-logger
          predicates:
            - Path=/flow-eda-logger/**
          filters:
            - StripPrefix=1
        # Runner服务路由
        - id: flow-eda-runner
          uri: lb://flow-eda-runner
          predicates:
            - Path=/flow-eda-runner/**
          filters:
            - StripPrefix=1
      # 全局CORS配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      # 服务发现配置
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

# 白名单配置（不需要认证的路径）
ignore:
  whites:
    - /oauth/token
    - /oauth/check_token
    - /web/flow/data/page
    - /web/node/page
    - /actuator/**
